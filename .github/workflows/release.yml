name: Create Release

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'test/**'
      - '.github/workflows/release.yml'
jobs:
  # 1. Validate Conventional Commits
  validate-commits:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Conventional Commits Check
        uses: cocogitto/cocogitto-action@v4
        with:
          command: check

  # 2. Build, Test, and Release
  build-test-release:
    needs: validate-commits
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      # 3. Guardrail: Run Tests
      # If this fails, the workflow stops here and no release is created.
      - name: Run Tests
        run: dotnet test test/AutomowerMcp.Tests/AutomowerMcp.Tests.csproj --no-restore --configuration Release --verbosity normal

      # 4. Generate Version Number
      - name: Get Next Version
        id: versioning
        uses: paulhatch/semantic-version@v5.4.0
        with:
          tag_prefix: "v"
          version_format: "${major}.${minor}.${patch}"

      # 5. Build and Publish from src/
      - name: Build Project
        run: |
          dotnet build src/AutomowerMcp/AutomowerMcp.csproj \
            --configuration Release \
            --no-restore \
            /p:Version=${{ steps.versioning.outputs.version }}

      - name: Publish Project
        run: |
          dotnet publish src/AutomowerMcp/AutomowerMcp.csproj \
            -c Release \
            -o ./publish \
            /p:Version=${{ steps.versioning.outputs.version }}

      # 6. Package and Release
      - name: Zip Artifact
        run: zip -r automower-mcp-v${{ steps.versioning.outputs.version }}.zip ./publish

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.versioning.outputs.version }}
          name: Release v${{ steps.versioning.outputs.version }}
          files: automower-mcp-v${{ steps.versioning.outputs.version }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: automower-mcp-v${{ steps.versioning.outputs.version }}
          path: ./publish
